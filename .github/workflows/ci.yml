name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          shellcheck -S warning \
            -e SC2034 -e SC2155 -e SC1090 -e SC1091 \
            arch-diag.sh

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: shellcheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check bash version
        run: bash --version | head -1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pciutils usbutils util-linux coreutils

      - name: Run all tests
        run: bash tests/run_all.sh

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-failure-logs
          path: /tmp/arlogkn_test_*
          retention-days: 7
